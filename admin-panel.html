<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Panel - Image Master</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='6' width='28' height='20' rx='3' fill='none' stroke='%234a90d9' stroke-width='2.5'/%3E%3Ccircle cx='11' cy='13' r='3' fill='%234a90d9'/%3E%3Cpath d='M7 22L13 16L17 20L25 12' stroke='%234a90d9' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        /* Login Page */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #1e293b;
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-box h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #4a90d9, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box p {
            color: #64748b;
            margin-bottom: 30px;
        }
        .login-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 12px;
            color: #e2e8f0;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .login-input:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #4a90d9, #3a7bc8);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(74, 144, 217, 0.4);
        }
        .login-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }
        
        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }
        .logout-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            padding: 24px;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border-radius: 16px;
            border: 1px solid #334155;
        }
        .stat-card__label {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stat-card__value {
            font-size: 36px;
            font-weight: 800;
            color: #4a90d9;
        }
        .stat-card--success .stat-card__value { color: #22c55e; }
        .stat-card--warning .stat-card__value { color: #f59e0b; }
        .stat-card--info .stat-card__value { color: #06b6d4; }
        
        /* Sections */
        .section {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .section__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
        }
        .section__title {
            font-size: 18px;
            font-weight: 700;
        }
        .section__body {
            padding: 24px;
        }
        
        /* Tool Usage Chart */
        .tool-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 16px;
        }
        .tool-bar__name {
            width: 160px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tool-bar__track {
            flex: 1;
            height: 24px;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
        }
        .tool-bar__fill {
            height: 100%;
            background: linear-gradient(90deg, #4a90d9, #22c55e);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 12px;
            font-weight: 700;
            color: white;
            min-width: 40px;
            transition: width 0.5s ease;
        }
        
        /* Bug Reports */
        .bug-list { display: flex; flex-direction: column; gap: 16px; }
        .bug-item {
            padding: 20px;
            background: #0f172a;
            border-radius: 12px;
            border-left: 4px solid #ef4444;
        }
        .bug-item--resolved {
            border-left-color: #22c55e;
            opacity: 0.7;
        }
        .bug-item__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .bug-item__tool {
            font-size: 14px;
            font-weight: 700;
            color: #4a90d9;
        }
        .bug-item__time {
            font-size: 12px;
            color: #64748b;
        }
        .bug-item__desc {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .bug-item__image {
            max-width: 300px;
            max-height: 200px;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .bug-item__actions {
            display: flex;
            gap: 10px;
        }
        .bug-item__btn {
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bug-item__btn--resolve {
            background: #22c55e;
            color: white;
        }
        .bug-item__btn--delete {
            background: #ef4444;
            color: white;
        }
        
        /* Recent Sessions */
        .session-list { display: flex; flex-direction: column; gap: 12px; }
        .session-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: #0f172a;
            border-radius: 10px;
        }
        .session-item__left { display: flex; align-items: center; gap: 12px; }
        .session-item__dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .session-item__page { font-size: 14px; font-weight: 500; }
        .session-item__tools { font-size: 12px; color: #64748b; }
        .session-item__time { font-size: 12px; color: #64748b; }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        /* Refresh Button */
        .refresh-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #4a90d9;
            background: rgba(74, 144, 217, 0.1);
            border: 1px solid #4a90d9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: #4a90d9;
            color: white;
        }
        
        /* Clear Data Button */
        .clear-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid #f59e0b;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }
        .clear-btn:hover {
            background: #f59e0b;
            color: white;
        }

        /* Last Updated */
        .last-updated {
            font-size: 12px;
            color: #64748b;
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-page" id="login-page">
        <div class="login-box">
            <h1>🔐 Admin Access</h1>
            <p>Enter password to access the dashboard</p>
            <input type="password" class="login-input" id="password-input" placeholder="Enter password..." autofocus>
            <button class="login-btn" id="login-btn">Login</button>
            <p class="login-error" id="login-error">❌ Incorrect password. Try again.</p>
        </div>
    </div>
    
    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <header class="header">
            <h1>📊 Image Master Admin</h1>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </header>
        
        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card__label">Total Visits</div>
                    <div class="stat-card__value" id="stat-total">0</div>
                </div>
                <div class="stat-card stat-card--success">
                    <div class="stat-card__label">Today's Visits</div>
                    <div class="stat-card__value" id="stat-today">0</div>
                </div>
                <div class="stat-card stat-card--warning">
                    <div class="stat-card__label">Unique Visitors</div>
                    <div class="stat-card__value" id="stat-unique">0</div>
                </div>
                <div class="stat-card stat-card--info">
                    <div class="stat-card__label">Bug Reports</div>
                    <div class="stat-card__value" id="stat-bugs">0</div>
                </div>
            </div>
            
            <!-- Tool Usage -->
            <div class="section">
                <div class="section__header">
                    <h2 class="section__title">🛠️ Tool Usage</h2>
                    <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
                </div>
                <div class="section__body" id="tool-usage">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
            
            <!-- Recent Sessions -->
            <div class="section">
                <div class="section__header">
                    <h2 class="section__title">👥 Recent Visitors</h2>
                </div>
                <div class="section__body" id="recent-sessions">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
            
            <!-- Bug Reports -->
            <div class="section">
                <div class="section__header">
                    <h2 class="section__title">🐛 Bug Reports</h2>
                    <div>
                        <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
                        <button class="clear-btn" onclick="clearBugs()">Clear All</button>
                    </div>
                </div>
                <div class="section__body" id="bug-reports">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
            
            <p class="last-updated" id="last-updated">Last updated: --</p>
        </div>
    </div>
    
    <script>
        const ADMIN_PASSWORD = 'Aveer@09112001';
        const SESSION_KEY = 'im_admin_session';
        
        // Check if already logged in
        function checkAuth() {
            const session = sessionStorage.getItem(SESSION_KEY);
            if (session === 'authenticated') {
                showDashboard();
            }
        }
        
        // Login
        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        function login() {
            const password = document.getElementById('password-input').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem(SESSION_KEY, 'authenticated');
                showDashboard();
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }
        
        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem(SESSION_KEY);
            location.reload();
        });
        
        function showDashboard() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            refreshData();
            
            // Auto refresh every 30 seconds
            setInterval(refreshData, 30000);
        }
        
        function refreshData() {
            loadAnalytics();
            loadBugReports();
            document.getElementById('last-updated').textContent = 
                'Last updated: ' + new Date().toLocaleTimeString();
        }
        
        function loadAnalytics() {
            try {
                const data = JSON.parse(localStorage.getItem('im_analytics') || '{}');
                const today = new Date().toISOString().split('T')[0];
                
                // Stats
                document.getElementById('stat-total').textContent = data.totalVisits || 0;
                document.getElementById('stat-today').textContent = (data.dailyVisits && data.dailyVisits[today]) || 0;
                document.getElementById('stat-unique').textContent = data.uniqueVisitors || 0;
                
                // Tool Usage
                const toolUsage = data.toolUsage || {};
                const toolEntries = Object.entries(toolUsage).sort((a, b) => b[1] - a[1]);
                const maxUsage = toolEntries.length > 0 ? toolEntries[0][1] : 1;
                
                if (toolEntries.length === 0) {
                    document.getElementById('tool-usage').innerHTML = '<div class="empty-state">No tool usage data yet</div>';
                } else {
                    document.getElementById('tool-usage').innerHTML = toolEntries.map(([tool, count]) => `
                        <div class="tool-bar">
                            <div class="tool-bar__name">${tool}</div>
                            <div class="tool-bar__track">
                                <div class="tool-bar__fill" style="width: ${(count / maxUsage) * 100}%">${count}</div>
                            </div>
                        </div>
                    `).join('');
                }
                
                // Recent Sessions
                const sessions = (data.sessions || []).slice(0, 15);
                if (sessions.length === 0) {
                    document.getElementById('recent-sessions').innerHTML = '<div class="empty-state">No sessions yet</div>';
                } else {
                    document.getElementById('recent-sessions').innerHTML = `
                        <div class="session-list">
                            ${sessions.map(s => `
                                <div class="session-item">
                                    <div class="session-item__left">
                                        <div class="session-item__dot" style="${s.end ? 'background: #64748b; animation: none;' : ''}"></div>
                                        <div>
                                            <div class="session-item__page">${s.page || 'Unknown'}</div>
                                            <div class="session-item__tools">${(s.toolsUsed || []).join(', ') || 'No tools used'}</div>
                                        </div>
                                    </div>
                                    <div class="session-item__time">${formatTime(s.start)}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
            } catch (e) {
                console.error('Failed to load analytics', e);
            }
        }
        
        function loadBugReports() {
            try {
                const reports = JSON.parse(localStorage.getItem('bug_reports') || '[]');
                document.getElementById('stat-bugs').textContent = reports.filter(r => r.status !== 'resolved').length;
                
                if (reports.length === 0) {
                    document.getElementById('bug-reports').innerHTML = '<div class="empty-state">🎉 No bug reports!</div>';
                } else {
                    document.getElementById('bug-reports').innerHTML = `
                        <div class="bug-list">
                            ${reports.map(r => `
                                <div class="bug-item ${r.status === 'resolved' ? 'bug-item--resolved' : ''}" id="bug-${r.id}">
                                    <div class="bug-item__header">
                                        <span class="bug-item__tool">🛠️ ${r.tool || 'Unknown Tool'}</span>
                                        <span class="bug-item__time">${formatTime(r.timestamp)}</span>
                                    </div>
                                    <p class="bug-item__desc">${escapeHtml(r.description)}</p>
                                    ${r.image ? `<img class="bug-item__image" src="${r.image}" onclick="window.open('${r.image}', '_blank')">` : ''}
                                    <div class="bug-item__actions">
                                        ${r.status !== 'resolved' ? `<button class="bug-item__btn bug-item__btn--resolve" onclick="resolveBug(${r.id})">✓ Resolve</button>` : '<span style="color: #22c55e; font-size: 12px;">✓ Resolved</span>'}
                                        <button class="bug-item__btn bug-item__btn--delete" onclick="deleteBug(${r.id})">Delete</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Failed to load bug reports', e);
            }
        }
        
        function resolveBug(id) {
            const reports = JSON.parse(localStorage.getItem('bug_reports') || '[]');
            const report = reports.find(r => r.id === id);
            if (report) {
                report.status = 'resolved';
                localStorage.setItem('bug_reports', JSON.stringify(reports));
                refreshData();
            }
        }
        
        function deleteBug(id) {
            if (!confirm('Delete this bug report?')) return;
            let reports = JSON.parse(localStorage.getItem('bug_reports') || '[]');
            reports = reports.filter(r => r.id !== id);
            localStorage.setItem('bug_reports', JSON.stringify(reports));
            refreshData();
        }
        
        function clearBugs() {
            if (!confirm('Delete ALL bug reports?')) return;
            localStorage.removeItem('bug_reports');
            refreshData();
        }
        
        function formatTime(isoString) {
            if (!isoString) return '--';
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return diffMins + 'm ago';
            if (diffHours < 24) return diffHours + 'h ago';
            if (diffDays < 7) return diffDays + 'd ago';
            return date.toLocaleDateString();
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Init
        checkAuth();
    </script>
</body>
</html>
